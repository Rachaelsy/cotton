<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>棉花智能体 · 商户入驻申请</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a3c2e 0%, #2d6a4f 60%, #C8902E 100%);
      display: flex; align-items: center; justify-content: center; padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    .card {
      background: #fff; border-radius: 20px; padding: 40px 36px;
      width: 520px; max-width: 100%;
      box-shadow: 0 24px 64px rgba(0,0,0,0.18);
    }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo-icon { font-size: 44px; }
    .logo-title { font-size: 22px; font-weight: 800; color: #1A1A1A; margin-top: 8px; }
    .logo-sub { font-size: 13px; color: #888; margin-top: 4px; }
    .section { font-size: 13px; font-weight: 700; color: #C8902E; margin: 20px 0 10px; border-bottom: 1.5px solid #FEF3C7; padding-bottom: 6px; }
    .row { display: flex; gap: 12px; }
    .row .field { flex: 1; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 5px; }
    .field input, .field textarea, .field select {
      width: 100%; padding: 10px 14px; border: 1.5px solid #E0E0E0;
      border-radius: 9px; font-size: 14px; outline: none;
      transition: border-color 0.2s; font-family: inherit;
    }
    .field input:focus, .field textarea:focus { border-color: #C8902E; }
    .field textarea { resize: vertical; min-height: 64px; }
    .req { color: #DC2626; }
    .tip { font-size: 11px; color: #888; margin-top: 3px; }
    .btn {
      width: 100%; padding: 13px; background: linear-gradient(135deg, #C8902E, #D4A043);
      color: #fff; border: none; border-radius: 10px; font-size: 15px;
      font-weight: 700; cursor: pointer; margin-top: 6px; transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.88; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg { border-radius: 10px; padding: 12px 14px; font-size: 13px; margin-top: 12px; display: none; }
    .msg.ok  { background: #F0FDF4; color: #16A34A; }
    .msg.err { background: #FEF2F2; color: #DC2626; }
    .footer-link { text-align: center; margin-top: 16px; font-size: 12px; color: #888; }
    .footer-link a { color: #C8902E; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🏪</div>
      <div class="logo-title">商户入驻申请</div>
      <div class="logo-sub">提交申请后，管理员将在 1-3 个工作日内完成审核</div>
    </div>

    <div class="section">基本信息</div>
    <div class="row">
      <div class="field">
        <label>手机号 <span class="req">*</span></label>
        <input id="phone" type="tel" maxlength="11" placeholder="11位手机号（即登录账号）">
      </div>
      <div class="field">
        <label>联系人姓名 <span class="req">*</span></label>
        <input id="real_name" placeholder="真实姓名">
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label>登录密码 <span class="req">*</span></label>
        <input id="password" type="password" placeholder="6位以上密码">
      </div>
      <div class="field">
        <label>确认密码 <span class="req">*</span></label>
        <input id="password2" type="password" placeholder="再次输入密码">
      </div>
    </div>

    <div class="section">店铺信息</div>
    <div class="field">
      <label>店铺/企业名称 <span class="req">*</span></label>
      <input id="company_name" placeholder="如：疏附县鑫农农资有限公司">
    </div>
    <div class="row">
      <div class="field">
        <label>营业执照号</label>
        <input id="business_license" placeholder="如有请填写">
      </div>
      <div class="field">
        <label>主要经营品类</label>
        <input id="product_category" placeholder="如：化肥、农药、棉花收购">
      </div>
    </div>
    <div class="field">
      <label>经营说明（可选）</label>
      <textarea id="description" placeholder="简要说明您的业务范围、主营产品等..."></textarea>
    </div>

    <button class="btn" id="submitBtn" onclick="doApply()">提交入驻申请</button>
    <div class="msg" id="msg"></div>
    <div class="footer-link">已有账号？<a href="/admin/login.html">返回登录</a></div>
  </div>

  <script>
    async function doApply() {
      const phone     = document.getElementById('phone').value.trim()
      const real_name = document.getElementById('real_name').value.trim()
      const password  = document.getElementById('password').value
      const password2 = document.getElementById('password2').value
      const company   = document.getElementById('company_name').value.trim()
      const license   = document.getElementById('business_license').value.trim()
      const cat       = document.getElementById('product_category').value.trim()

      const msgEl = document.getElementById('msg')
      const btn   = document.getElementById('submitBtn')

      function showErr(t) { msgEl.className = 'msg err'; msgEl.textContent = t; msgEl.style.display = 'block' }
      function showOk(t)  { msgEl.className = 'msg ok';  msgEl.textContent = t; msgEl.style.display = 'block' }

      if (!/^1\d{10}$/.test(phone))  return showErr('请输入正确的11位手机号')
      if (!real_name)                 return showErr('请填写联系人姓名')
      if (!password || password.length < 6) return showErr('密码不能少于6位')
      if (password !== password2)     return showErr('两次密码不一致')
      if (!company)                   return showErr('请填写店铺/企业名称')

      btn.disabled = true; btn.textContent = '提交中...'
      try {
        const res = await fetch('/api/admin/apply', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone, real_name, password, company_name: company, business_license: license, product_category: cat })
        })
        const data = await res.json()
        if (data.code === 200) {
          showOk('✅ ' + data.msg)
          document.querySelectorAll('input,textarea').forEach(el => el.value = '')
        } else {
          showErr(data.msg || '提交失败，请稍后重试')
        }
      } catch {
        showErr('网络错误，请检查网络连接')
      } finally {
        btn.disabled = false; btn.textContent = '提交入驻申请'
      }
    }
  </script>
</body>
</html>
