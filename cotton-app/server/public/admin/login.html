<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cotton 棉花平台登录</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #237a48;
      --green-dark: #155a34;
      --green-soft: #edf7ef;
      --blue: #217fc6;
      --blue-dark: #176b9c;
      --blue-soft: #eef7ff;
      --gold: #b67824;
      --gold-dark: #80511b;
      --gold-soft: #fff7e8;
      --expert: #4c4335;
      --expert-dark: #2f291f;
      --expert-soft: #f5f2eb;
      --ink: #253126;
      --muted: #687668;
      --line: #dfe8dc;
      --danger: #b53b30;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.76) 42%, rgba(255,255,255,0.34) 100%),
        linear-gradient(180deg, rgba(20, 103, 165, 0.08), rgba(21, 90, 52, 0.08)),
        url("./assets/cotton-field-sky.png") center center / cover no-repeat;
    }

    .page {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 440px;
      gap: 46px;
      align-items: center;
      max-width: 1160px;
      margin: 0 auto;
      padding: 40px 32px;
    }

    .intro {
      max-width: 600px;
      padding: 18px 0;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      min-height: 58px;
      margin-bottom: 24px;
      padding: 8px 18px 8px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.82);
      box-shadow: 0 16px 42px rgba(29, 90, 52, 0.14);
      backdrop-filter: blur(8px);
    }

    .cotton-mark {
      position: relative;
      width: 48px;
      height: 40px;
      flex: 0 0 48px;
    }

    .cotton-mark::before {
      content: "";
      position: absolute;
      left: 14px;
      top: 0;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #fff;
      box-shadow:
        -14px 12px 0 #fffaf1,
        14px 12px 0 #fff,
        0 20px 0 #fffdf7;
      filter: drop-shadow(0 6px 8px rgba(43, 82, 50, 0.16));
    }

    .cotton-mark::after {
      content: "";
      position: absolute;
      left: 12px;
      bottom: 1px;
      width: 30px;
      height: 12px;
      border-radius: 100% 0 100% 0;
      background: linear-gradient(135deg, #4fa866, var(--green-dark));
      transform: rotate(-14deg);
    }

    .brand-title {
      display: block;
      color: var(--green-dark);
      font-size: 20px;
      font-weight: 900;
      line-height: 1.2;
    }

    .brand-sub {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    h1 {
      max-width: 580px;
      margin-bottom: 18px;
      color: #163f28;
      font-size: 46px;
      line-height: 1.18;
      font-weight: 900;
      letter-spacing: 0;
      text-shadow: 0 2px 0 rgba(255, 255, 255, 0.65);
    }

    .lead {
      max-width: 540px;
      color: #405344;
      font-size: 18px;
      line-height: 1.85;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.72);
    }

    .points {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 26px;
    }

    .point {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 7px 13px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      color: #255537;
      border: 1px solid rgba(255, 255, 255, 0.78);
      box-shadow: 0 8px 22px rgba(35, 122, 72, 0.08);
      font-size: 14px;
      font-weight: 850;
      backdrop-filter: blur(8px);
    }

    .login-panel {
      width: 100%;
      border-radius: 8px;
      padding: 28px;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(255, 255, 255, 0.86);
      box-shadow: 0 26px 70px rgba(27, 79, 48, 0.22);
      backdrop-filter: blur(14px);
    }

    .panel-title {
      color: #173d27;
      font-size: 24px;
      line-height: 1.25;
      font-weight: 900;
    }

    .panel-desc {
      margin-top: 6px;
      margin-bottom: 18px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .role-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    .role-card {
      position: relative;
      min-height: 112px;
      padding: 13px 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      background: #fbfefb;
      cursor: pointer;
      text-align: left;
      transition: transform .18s, border-color .18s, box-shadow .18s, background .18s;
    }

    .role-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(35, 122, 72, 0.12);
    }

    .role-card.active {
      border-color: rgba(35, 122, 72, 0.58);
      background: var(--green-soft);
      box-shadow: 0 12px 26px rgba(35, 122, 72, 0.16);
    }

    .role-card[data-role="merchant"].active {
      border-color: rgba(35, 122, 72, 0.58);
      background: var(--green-soft);
    }

    .role-card[data-role="operator"].active {
      border-color: rgba(33, 127, 198, 0.58);
      background: var(--blue-soft);
      box-shadow: 0 12px 26px rgba(33, 127, 198, 0.14);
    }

    .role-card[data-role="admin"].active {
      border-color: rgba(182, 120, 36, 0.58);
      background: var(--gold-soft);
      box-shadow: 0 12px 26px rgba(182, 120, 36, 0.14);
    }

    .role-card[data-role="expert"].active {
      border-color: rgba(76, 67, 53, 0.58);
      background: var(--expert-soft);
      box-shadow: 0 12px 26px rgba(76, 67, 53, 0.14);
    }

    .role-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      margin-bottom: 9px;
      border-radius: 50%;
      color: #fff;
      background: var(--green);
      font-size: 15px;
      font-weight: 900;
    }

    .role-card[data-role="operator"] .role-icon { background: var(--blue); }
    .role-card[data-role="admin"] .role-icon { background: var(--gold); }
    .role-card[data-role="expert"] .role-icon { background: var(--expert); }

    .role-name {
      display: block;
      color: #173d27;
      font-size: 15px;
      font-weight: 900;
      line-height: 1.3;
      margin-bottom: 5px;
    }

    .role-desc {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .field { margin-bottom: 16px; }

    .field label {
      display: block;
      margin-bottom: 8px;
      color: #344d38;
      font-size: 15px;
      font-weight: 850;
    }

    .input-wrap { position: relative; }

    .input-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      width: 42px;
      height: 26px;
      transform: translateY(-50%);
      border-radius: 999px;
      color: #fff;
      background: var(--green);
      font-size: 13px;
      line-height: 26px;
      text-align: center;
      font-weight: 900;
    }

    body.role-operator .input-icon { background: var(--blue); }
    body.role-admin .input-icon { background: var(--gold); }
    body.role-expert .input-icon { background: var(--expert); }

    input {
      width: 100%;
      height: 50px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfefb;
      color: var(--ink);
      padding: 0 14px 0 66px;
      outline: none;
      font-size: 16px;
      transition: border-color .18s, box-shadow .18s, background .18s;
    }

    input::placeholder { color: #9aab9c; }

    input:focus {
      border-color: rgba(35, 122, 72, 0.72);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(35, 122, 72, 0.12);
    }

    body.role-operator input:focus {
      border-color: rgba(33, 127, 198, 0.72);
      box-shadow: 0 0 0 4px rgba(33, 127, 198, 0.12);
    }

    body.role-admin input:focus {
      border-color: rgba(182, 120, 36, 0.72);
      box-shadow: 0 0 0 4px rgba(182, 120, 36, 0.12);
    }

    body.role-expert input:focus {
      border-color: rgba(76, 67, 53, 0.72);
      box-shadow: 0 0 0 4px rgba(76, 67, 53, 0.12);
    }

    .login-note {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin: 4px 0 20px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .login-note strong {
      color: var(--green-dark);
      white-space: nowrap;
    }

    body.role-operator .login-note strong { color: var(--blue-dark); }
    body.role-admin .login-note strong { color: var(--gold-dark); }
    body.role-expert .login-note strong { color: var(--expert-dark); }

    .login-btn {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-size: 17px;
      font-weight: 900;
      background: linear-gradient(135deg, #2f9657, #1b6a3e);
      box-shadow: 0 14px 30px rgba(35, 122, 72, 0.28);
      transition: transform .18s, filter .18s, opacity .18s;
    }

    body.role-operator .login-btn {
      background: linear-gradient(135deg, #2a8fc4, #176b9c);
      box-shadow: 0 14px 30px rgba(33, 127, 198, 0.24);
    }

    body.role-admin .login-btn {
      background: linear-gradient(135deg, #c58932, #8a5a20);
      box-shadow: 0 14px 30px rgba(182, 120, 36, 0.24);
    }

    body.role-expert .login-btn {
      background: linear-gradient(135deg, #5a4f3e, #342d22);
      box-shadow: 0 14px 30px rgba(76, 67, 53, 0.24);
    }

    .login-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.04);
    }

    .login-btn:disabled {
      cursor: not-allowed;
      opacity: .58;
      transform: none;
    }

    .err {
      min-height: 20px;
      margin-top: 13px;
      color: var(--danger);
      text-align: center;
      font-size: 14px;
      font-weight: 700;
    }

    .role-hint {
      display: none;
      margin-top: 12px;
      padding: 10px 12px;
      border: 1px solid rgba(35, 122, 72, 0.24);
      border-radius: 8px;
      color: var(--green-dark);
      background: var(--green-soft);
      text-align: center;
      font-size: 14px;
      font-weight: 800;
    }

    .join-area {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--line);
    }

    .join-title {
      margin-bottom: 12px;
      color: #344d38;
      font-size: 15px;
      font-weight: 900;
    }

    .join-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .join-link {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      border: 1px solid rgba(35, 122, 72, 0.22);
      border-radius: 8px;
      color: var(--green-dark);
      background: #f7fbf7;
      text-decoration: none;
      font-size: 15px;
      font-weight: 900;
      transition: border-color .18s, background .18s, transform .18s;
    }

    .join-link:hover {
      transform: translateY(-1px);
      border-color: rgba(35, 122, 72, 0.52);
      background: #eef8ef;
    }

    .copyright {
      margin-top: 22px;
      color: #829080;
      text-align: center;
      font-size: 12px;
    }

    .copyright a {
      color: inherit;
      text-decoration: none;
    }

    .copyright a:hover { color: #237a48; }

    .hidden { display: none; }

    @media (max-width: 980px) {
      body {
        background:
          linear-gradient(180deg, rgba(255,255,255,0.92), rgba(255,255,255,0.72)),
          url("./assets/cotton-field-sky.png") center center / cover no-repeat;
      }

      .page {
        grid-template-columns: 1fr;
        gap: 30px;
        padding: 30px 18px 36px;
      }

      .intro {
        max-width: 720px;
        padding: 0;
      }

      h1 { font-size: 36px; }
      .lead { font-size: 16px; }

      .login-panel {
        max-width: 520px;
        margin: 0 auto;
      }
    }

    @media (max-width: 560px) {
      .page { padding: 22px 12px 28px; }
      .brand {
        align-items: flex-start;
        border-radius: 8px;
      }
      h1 { font-size: 30px; }
      .points { gap: 8px; }
      .point {
        height: auto;
        min-height: 32px;
        padding: 7px 11px;
      }
      .login-panel { padding: 24px 16px 20px; }
      .role-grid { grid-template-columns: 1fr; }
      .role-card {
        min-height: 84px;
        display: grid;
        grid-template-columns: 38px 1fr;
        column-gap: 10px;
        align-items: center;
      }
      .role-icon { margin-bottom: 0; }
      .role-name { margin-bottom: 3px; }
      .login-note {
        align-items: flex-start;
        flex-direction: column;
      }
      .join-actions { grid-template-columns: 1fr; }
    }

    /* Unified public portal */
    body {
      background: #eef2ed;
    }

    .page {
      width: 100%;
      max-width: none;
      padding: 0;
      gap: 0;
      grid-template-columns: minmax(0, 1.12fr) minmax(480px, .88fr);
      align-items: stretch;
    }

    .intro {
      position: relative;
      isolation: isolate;
      max-width: none;
      min-height: 100vh;
      display: flex;
      align-items: flex-end;
      padding: 64px 8% 70px;
      overflow: hidden;
      color: #fff;
      background: url("./assets/cotton-field-sky.png") center / cover no-repeat;
    }

    .intro::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      background: rgba(10, 31, 24, .44);
    }

    .intro-content {
      width: min(660px, 100%);
    }

    .brand {
      min-height: 50px;
      margin-bottom: 54px;
      padding: 7px 14px 7px 8px;
      border: 1px solid rgba(255,255,255,.28);
      border-radius: 7px;
      background: rgba(15, 40, 31, .38);
      box-shadow: none;
      backdrop-filter: blur(14px);
    }

    .cotton-mark {
      transform: scale(.82);
    }

    .brand-title,
    .brand-sub {
      color: #fff;
    }

    .brand-sub {
      color: rgba(255,255,255,.72);
    }

    .intro h1 {
      max-width: 640px;
      margin-bottom: 18px;
      color: #fff;
      font-size: 56px;
      line-height: 1.1;
      text-shadow: none;
    }

    .intro .lead {
      max-width: 610px;
      color: rgba(255,255,255,.86);
      font-size: 17px;
      line-height: 1.8;
      text-shadow: none;
    }

    .knowledge-gateway {
      position: relative;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 4px 24px;
      align-items: center;
      width: min(570px, 100%);
      min-height: 118px;
      margin-top: 30px;
      padding: 20px 22px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.36);
      border-radius: 8px;
      color: #fff;
      background: rgba(13, 49, 38, .76);
      text-decoration: none;
      backdrop-filter: blur(16px);
      transition: transform .2s ease, background .2s ease;
    }

    .knowledge-gateway:hover {
      transform: translateY(-3px);
      background: rgba(13, 58, 43, .9);
    }

    .gateway-kicker {
      grid-column: 1 / -1;
      color: #f4c96d;
      font-size: 12px;
      font-weight: 900;
    }

    .knowledge-gateway strong {
      display: block;
      margin-top: 5px;
      font-size: 23px;
      line-height: 1.3;
    }

    .knowledge-gateway em {
      display: block;
      margin-top: 5px;
      color: rgba(255,255,255,.72);
      font-size: 13px;
      font-style: normal;
    }

    .gateway-arrow {
      grid-column: 2;
      grid-row: 2 / 4;
      width: 46px;
      height: 46px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255,255,255,.38);
      border-radius: 50%;
      font-size: 24px;
    }

    .points {
      margin-top: 20px;
    }

    .point {
      min-height: 30px;
      padding: 5px 10px;
      border-color: rgba(255,255,255,.24);
      border-radius: 5px;
      color: rgba(255,255,255,.82);
      background: rgba(16, 39, 31, .34);
      box-shadow: none;
      font-size: 12px;
    }

    .login-panel {
      width: min(600px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      padding: 54px 54px 30px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      border: 0;
      border-radius: 0;
      background: #fff;
      box-shadow: none;
      backdrop-filter: none;
    }

    .panel-title {
      font-size: 28px;
    }

    .panel-desc {
      margin: 8px 0 24px;
    }

    .role-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
    }

    .role-card {
      min-height: 76px;
      display: grid;
      grid-template-columns: 34px minmax(0,1fr);
      gap: 10px;
      align-items: center;
      padding: 11px 12px;
      background: #f8faf8;
      box-shadow: none;
    }

    .role-icon {
      margin: 0;
    }

    .role-name {
      margin-bottom: 2px;
    }

    input {
      background: #f8faf8;
    }

    .login-btn {
      background: #176541;
      box-shadow: none;
    }

    body.role-operator .login-btn { background: #176d92; box-shadow: none; }
    body.role-admin .login-btn { background: #9b6725; box-shadow: none; }
    body.role-expert .login-btn { background: #4c4335; box-shadow: none; }

    @media (max-width: 980px) {
      body { background: #fff; }
      .page { grid-template-columns: 1fr; }
      .intro {
        min-height: 590px;
        padding: 44px 32px 48px;
        background-position: 57% center;
      }
      .intro h1 { font-size: 46px; }
      .login-panel {
        min-height: auto;
        max-width: 660px;
        padding: 48px 32px;
      }
    }

    @media (max-width: 560px) {
      .page { padding: 0; }
      .intro {
        min-height: 560px;
        padding: 28px 18px 30px;
      }
      .brand {
        align-items: center;
        margin-bottom: 38px;
      }
      .intro h1 { font-size: 38px; }
      .intro .lead { font-size: 15px; }
      .knowledge-gateway {
        min-height: 108px;
        padding: 16px;
      }
      .knowledge-gateway strong { font-size: 20px; }
      .gateway-arrow { width: 40px; height: 40px; }
      .login-panel { padding: 38px 18px 28px; }
      .role-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .role-card {
        min-height: 88px;
        display: grid;
        grid-template-columns: 32px minmax(0,1fr);
      }
    }
  </style>
</head>
<body class="role-merchant">
  <main class="page">
    <section class="intro" aria-label="Cotton 平台介绍">
      <div class="intro-content">
      <div class="brand">
        <span class="cotton-mark" aria-hidden="true"></span>
        <span>
          <span class="brand-title">Cotton 棉花平台</span>
          <span class="brand-sub">服务新疆棉农、商户和农机手</span>
        </span>
      </div>

      <h1>从一块棉田，连接整个服务体系</h1>
      <p class="lead">登录工作台管理业务，也可以直接进入公共知识讲堂学习课程、查阅田间资料，与棉友交流真实种植问题。</p>
      <a class="knowledge-gateway" href="/community">
        <span class="gateway-kicker">PUBLIC LEARNING · 无需登录即可浏览</span>
        <span><strong>进入棉知学堂</strong><em>课程 · 图文 · AI 问答 · 棉友论坛</em></span>
        <span class="gateway-arrow" aria-hidden="true">→</span>
      </a>

      <div class="points" aria-label="平台入口">
        <span class="point">管理员审核入驻</span>
        <span class="point">商户管理订单</span>
        <span class="point">农机手接单作业</span>
      </div>
      </div>
    </section>

    <section class="login-panel" aria-label="身份选择和账号登录">
      <h2 class="panel-title">登录入口</h2>
      <p class="panel-desc">先选择身份，再输入手机号和密码登录。</p>

      <div class="role-grid" aria-label="选择登录身份">
        <button type="button" class="role-card" data-role="admin" onclick="selectRole('admin')">
          <span class="role-icon">管</span>
          <span>
            <span class="role-name">管理员</span>
            <span class="role-desc">审核入驻，管理平台</span>
          </span>
        </button>
        <button type="button" class="role-card active" data-role="merchant" onclick="selectRole('merchant')">
          <span class="role-icon">商</span>
          <span>
            <span class="role-name">商户</span>
            <span class="role-desc">商品、订单、结算</span>
          </span>
        </button>
        <button type="button" class="role-card" data-role="operator" onclick="selectRole('operator')">
          <span class="role-icon">机</span>
          <span>
            <span class="role-name">农机手</span>
            <span class="role-desc">机具、接单、作业</span>
          </span>
        </button>
        <button type="button" class="role-card" data-role="expert" onclick="selectRole('expert')">
          <span class="role-icon">专</span>
          <span>
            <span class="role-name">专家</span>
            <span class="role-desc">答疑、课程、练习</span>
          </span>
        </button>
      </div>

      <div class="field">
        <label for="phone" id="phoneLabel">商户手机号</label>
        <div class="input-wrap">
          <span class="input-icon">账号</span>
          <input id="phone" type="text" placeholder="请输入手机号" autocomplete="username">
        </div>
      </div>

      <div class="field" id="passwordField">
        <label for="pwd">登录密码</label>
        <div class="input-wrap">
          <span class="input-icon">密码</span>
          <input id="pwd" type="password" placeholder="请输入密码" autocomplete="current-password">
        </div>
      </div>

      <div class="login-note">
        <strong id="roleNoteTitle">商户登录</strong>
        <span id="roleNoteDesc">进入商户工作台，管理商品、订单和结算。</span>
      </div>

      <button class="login-btn" id="loginBtn" onclick="doLogin()">进入商户工作台</button>
      <div class="err" id="err"></div>
      <div class="role-hint" id="role-hint"></div>

      <div class="join-area">
        <div class="join-title">还没有账号？先申请入驻</div>
        <div class="join-actions">
          <a class="join-link" href="/portal/register.html?role=merchant">商户入驻</a>
          <a class="join-link" href="/portal/register.html?role=operator">农机手入驻</a>
        </div>
      </div>

      <div class="copyright">
        <div>© 2026 Cotton 棉花平台</div>
        <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener noreferrer">新ICP备2026005046号-1</a>
      </div>
    </section>
  </main>

  <script>
    let role = 'merchant'
    const ROLE_CONFIG = {
      admin: {
        bodyClass: 'role-admin',
        phoneLabel: '管理员手机号',
        noteTitle: '管理员登录',
        noteDesc: '进入管理后台，审核入驻申请并管理平台。',
        btnText: '进入管理后台',
        loadingText: '正在登录...',
        api: '/api/admin/login',
        tokenKey: 'admin_token',
        infoKey: 'admin_name',
        dashboard: '/admin/dashboard.html',
        save(data) {
          localStorage.setItem(this.tokenKey, data.token)
          localStorage.setItem(this.infoKey, data.real_name || '管理员')
        }
      },
      expert: {
        bodyClass: 'role-expert',
        phoneLabel: '专家账号',
        noteTitle: '专家登录',
        noteDesc: '进入专家后台，回复农户提问并上架培训内容。',
        btnText: '进入专家后台',
        loadingText: '正在登录...',
        api: '/api/expert-admin/login',
        tokenKey: 'expert_token',
        infoKey: 'expert_name',
        dashboard: '/expert/dashboard.html',
        save(data) {
          localStorage.setItem(this.tokenKey, data.token)
          localStorage.setItem(this.infoKey, data.name || '平台专家')
        }
      },
      merchant: {
        bodyClass: 'role-merchant',
        phoneLabel: '商户手机号',
        noteTitle: '商户登录',
        noteDesc: '进入商户工作台，管理商品、订单和结算。',
        btnText: '进入商户工作台',
        loadingText: '正在登录...',
        api: '/api/merchant/login',
        tokenKey: 'merchant_token',
        infoKey: 'merchant_user',
        dashboard: '/merchant/dashboard.html',
        save(data) {
          localStorage.setItem(this.tokenKey, data.token)
          localStorage.setItem(this.infoKey, JSON.stringify(data))
        }
      },
      operator: {
        bodyClass: 'role-operator',
        phoneLabel: '农机手手机号',
        noteTitle: '农机手登录',
        noteDesc: '进入农机手工作台，发布机具并处理作业订单。',
        btnText: '进入农机手工作台',
        loadingText: '正在登录...',
        api: '/api/operator/login',
        tokenKey: 'op_token',
        infoKey: 'op_info',
        dashboard: '/operator/dashboard.html',
        save(data) {
          localStorage.setItem(this.tokenKey, data.token)
          localStorage.setItem(this.infoKey, JSON.stringify(data))
        }
      }
    }

    document.getElementById('pwd').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin()
    })

    function selectRole(nextRole) {
      role = ROLE_CONFIG[nextRole] ? nextRole : 'merchant'
      const cfg = ROLE_CONFIG[role]
      document.body.className = cfg.bodyClass
      document.querySelectorAll('.role-card').forEach(card => {
        card.classList.toggle('active', card.dataset.role === role)
      })
      document.getElementById('phoneLabel').textContent = cfg.phoneLabel
      document.getElementById('roleNoteTitle').textContent = cfg.noteTitle
      document.getElementById('roleNoteDesc').textContent = cfg.noteDesc
      document.getElementById('loginBtn').textContent = cfg.btnText
      document.getElementById('err').textContent = ''
      document.getElementById('role-hint').style.display = 'none'
    }

    async function doLogin() {
      const phone = document.getElementById('phone').value.trim()
      const password = document.getElementById('pwd').value
      const btn = document.getElementById('loginBtn')
      const err = document.getElementById('err')
      const hint = document.getElementById('role-hint')
      const cfg = ROLE_CONFIG[role]

      if (!phone || !password) {
        err.textContent = '请填写手机号和密码'
        return
      }

      btn.disabled = true
      btn.textContent = cfg.loadingText
      err.textContent = ''
      hint.style.display = 'none'

      try {
        const res = await fetch(cfg.api, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone, password })
        })
        const data = await res.json()
        if (data.code === 200) {
          cfg.save(data.data)
          hint.textContent = '登录成功，正在进入工作台...'
          hint.style.display = 'block'
          window.location.href = cfg.dashboard
          return
        }
        err.textContent = data.msg || '手机号或密码错误'
      } catch {
        err.textContent = '网络错误，请检查服务器连接'
      } finally {
        btn.disabled = false
        btn.textContent = cfg.btnText
      }
    }

    const q = new URLSearchParams(location.search).get('role')
    if (q === 'admin' || q === 'operator' || q === 'merchant' || q === 'expert') {
      selectRole(q)
    }
  </script>
</body>
</html>
