<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>正在返回登录 · Cotton 棉花平台</title>
  <meta http-equiv="refresh" content="0;url=/">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #253126;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.92), rgba(255,255,255,0.74)),
        url("/admin/assets/cotton-field-sky.png") center center / cover no-repeat;
    }
    .box {
      width: min(360px, calc(100vw - 32px));
      padding: 26px 22px;
      border-radius: 8px;
      background: rgba(255,255,255,0.92);
      border: 1px solid rgba(255,255,255,0.86);
      box-shadow: 0 20px 54px rgba(27, 79, 48, 0.18);
      text-align: center;
    }
    h1 { font-size: 20px; line-height: 1.35; margin-bottom: 8px; }
    p { color: #687668; font-size: 14px; line-height: 1.7; }
    a { color: #217fc6; font-weight: 900; text-decoration: none; }
  </style>
</head>
<body>
  <div class="box">
    <h1>正在返回登录首页</h1>
    <p>如果没有自动跳转，<a id="homeLink" href="/">点这里进入登录首页</a></p>
  </div>
  <script>
    const role = new URLSearchParams(location.search).get('role')
    const target = role === 'admin' || role === 'merchant' || role === 'operator'
      ? `/admin/login.html?role=${encodeURIComponent(role)}`
      : '/'
    document.getElementById('homeLink').href = target
    location.replace(target)
  </script>
</body>
</html>
