<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>棉管家 · 管理后台</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a3c2e 0%, #2d6a4f 50%, #C8902E 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 40px;
      width: 400px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.18);
    }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo-icon { font-size: 48px; }
    .logo-title { font-size: 24px; font-weight: 800; color: #1A1A1A; margin-top: 8px; }
    .logo-sub { font-size: 13px; color: #888; margin-top: 4px; }
    .field { margin-bottom: 20px; }
    .field label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 8px; }
    .field input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #E0E0E0;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus { border-color: #C8902E; }
    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #C8902E, #D4A043);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.88; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .err { color: #DC2626; font-size: 13px; margin-top: 12px; text-align: center; min-height: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🌾</div>
      <div class="logo-title">棉管家管理后台</div>
      <div class="logo-sub">仅限系统管理员登录</div>
    </div>
    <div class="field">
      <label>管理员账号</label>
      <input id="phone" type="tel" placeholder="请输入手机号" autocomplete="username">
    </div>
    <div class="field">
      <label>密码</label>
      <input id="pwd" type="password" placeholder="请输入密码" autocomplete="current-password">
    </div>
    <button class="btn" id="loginBtn" onclick="doLogin()">登 录</button>
    <div class="err" id="err"></div>
  </div>

  <script>
    // 已登录则直接跳转
    if (localStorage.getItem('admin_token')) {
      window.location.href = '/admin/dashboard.html'
    }

    document.getElementById('pwd').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin()
    })

    async function doLogin() {
      const phone = document.getElementById('phone').value.trim()
      const password = document.getElementById('pwd').value
      const btn = document.getElementById('loginBtn')
      const err = document.getElementById('err')

      if (!phone || !password) { err.textContent = '请填写账号和密码'; return }
      btn.disabled = true
      btn.textContent = '登录中...'
      err.textContent = ''

      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone, password })
        })
        const data = await res.json()
        if (data.code === 200) {
          localStorage.setItem('admin_token', data.data.token)
          localStorage.setItem('admin_name', data.data.real_name || '管理员')
          window.location.href = '/admin/dashboard.html'
        } else {
          err.textContent = data.msg || '登录失败'
        }
      } catch {
        err.textContent = '网络错误，请检查服务器连接'
      } finally {
        btn.disabled = false
        btn.textContent = '登 录'
      }
    }
  </script>
</body>
</html>
