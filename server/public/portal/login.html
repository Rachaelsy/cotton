<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商家工作台登录 · 棉花智能体</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      transition: background 0.3s; }
    body.op { background: linear-gradient(135deg, #004D52, #00838F); }
    body.mc { background: linear-gradient(135deg, #1a3c2e, #2d6a4f); }
    .card { background: #fff; border-radius: 20px; padding: 36px 34px; width: 390px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .logo { text-align: center; margin-bottom: 22px; }
    .logo .emoji { font-size: 42px; }
    .logo h1 { font-size: 20px; font-weight: 800; margin-top: 6px; }
    .logo p { font-size: 12px; color: #888; margin-top: 4px; }
    body.op .logo h1 { color: #006064; } body.mc .logo h1 { color: #1a3c2e; }
    /* 角色切换 */
    .role-toggle { display: flex; background: #F0F2F5; border-radius: 12px; padding: 4px; margin-bottom: 24px; }
    .role-btn { flex: 1; text-align: center; padding: 11px 0; border-radius: 9px; font-size: 14px; font-weight: 700;
      color: #888; cursor: pointer; transition: all 0.2s; }
    .role-btn.active { color: #fff; }
    body.op .role-btn.active.op-btn { background: linear-gradient(135deg, #006064, #00838F); }
    body.mc .role-btn.active.mc-btn { background: linear-gradient(135deg, #2d6a4f, #16A34A); }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; font-weight: 600; }
    .field input { width: 100%; padding: 12px 14px; border: 1.5px solid #E0E0E0; border-radius: 10px; font-size: 15px; outline: none; }
    body.op .field input:focus { border-color: #00838F; } body.mc .field input:focus { border-color: #2d6a4f; }
    .btn { width: 100%; padding: 13px; color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 6px; }
    body.op .btn { background: linear-gradient(135deg, #006064, #00838F); }
    body.mc .btn { background: linear-gradient(135deg, #2d6a4f, #16A34A); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .msg { font-size: 13px; text-align: center; margin-top: 14px; min-height: 18px; color: #DC2626; }
    .foot { text-align: center; margin-top: 18px; font-size: 13px; color: #888; }
    .foot a { font-weight: 600; text-decoration: none; }
    body.op .foot a { color: #00838F; } body.mc .foot a { color: #2d6a4f; }
  </style>
</head>
<body class="op">
  <div class="card">
    <div class="logo">
      <div class="emoji" id="logoEmoji">🚜</div>
      <h1 id="logoTitle">农机手工作台</h1>
      <p id="logoSub">发布机具 · 在线接单 · 作业管理</p>
    </div>
    <div class="role-toggle">
      <div class="role-btn op-btn active" data-role="operator" onclick="setRole('operator')">🚜 我是机主</div>
      <div class="role-btn mc-btn" data-role="merchant" onclick="setRole('merchant')">🏪 我是商户</div>
    </div>
    <div class="field"><label>手机号</label><input id="phone" type="tel" maxlength="11" placeholder="请输入手机号"></div>
    <div class="field"><label>密码</label><input id="password" type="password" placeholder="请输入密码" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn" id="loginBtn" onclick="doLogin()">登 录</button>
    <div class="msg" id="msg"></div>
    <div class="foot">还没有账号？<a href="/portal/register.html" id="regLink">立即注册入驻 →</a></div>
  </div>
  <script>
    let role = 'operator'
    const CFG = {
      operator: { cls: 'op', emoji: '🚜', title: '农机手工作台', sub: '发布机具 · 在线接单 · 作业管理',
        api: '/api/operator/login', tokenKey: 'op_token', infoKey: 'op_info', dash: '/operator/dashboard.html' },
      merchant: { cls: 'mc', emoji: '🏪', title: '商户管理后台', sub: '商品上架 · 订单发货 · 财务结算',
        api: '/api/merchant/login', tokenKey: 'merchant_token', infoKey: 'merchant_user', dash: '/merchant/dashboard.html' }
    }
    // 已登录则直接进入
    if (localStorage.getItem('op_token')) location.replace('/operator/dashboard.html')
    else if (localStorage.getItem('merchant_token')) location.replace('/merchant/dashboard.html')

    function setRole(r) {
      role = r
      const c = CFG[r]
      document.body.className = c.cls
      document.getElementById('logoEmoji').textContent = c.emoji
      document.getElementById('logoTitle').textContent = c.title
      document.getElementById('logoSub').textContent = c.sub
      document.querySelectorAll('.role-btn').forEach(b => b.classList.toggle('active', b.dataset.role === r))
      document.getElementById('regLink').textContent = (r === 'operator' ? '立即注册成为机主 →' : '立即申请商户入驻 →')
      document.getElementById('msg').textContent = ''
    }
    async function doLogin() {
      const phone = document.getElementById('phone').value.trim()
      const password = document.getElementById('password').value
      const msg = document.getElementById('msg'), btn = document.getElementById('loginBtn')
      if (!phone || !password) { msg.textContent = '请输入手机号和密码'; return }
      const c = CFG[role]
      btn.disabled = true; btn.textContent = '登录中…'; msg.textContent = ''
      try {
        const r = await fetch(c.api, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ phone, password }) })
        const data = await r.json()
        if (data.code === 200) {
          localStorage.setItem(c.tokenKey, data.data.token)
          localStorage.setItem(c.infoKey, JSON.stringify(data.data))
          location.replace(c.dash)
        } else { msg.textContent = data.msg || '登录失败'; btn.disabled = false; btn.textContent = '登 录' }
      } catch (e) { msg.textContent = '网络错误，请重试'; btn.disabled = false; btn.textContent = '登 录' }
    }
    // 支持 ?role=merchant 直达
    const q = new URLSearchParams(location.search).get('role')
    if (q === 'merchant') setRole('merchant')
  </script>
</body>
</html>
