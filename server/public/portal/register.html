<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>入驻申请 · Cotton 棉花平台</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #237a48;
      --green-dark: #155a34;
      --green-soft: #eef8ef;
      --blue: #217fc6;
      --blue-soft: #eef7ff;
      --earth: #7a542d;
      --ink: #253126;
      --muted: #667566;
      --line: #dfe8dc;
      --paper: rgba(255, 255, 255, 0.94);
      --danger: #b53b30;
    }

    body {
      min-height: 100vh;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.76) 44%, rgba(255,255,255,0.36) 100%),
        url("/admin/assets/cotton-field-sky.png") center center / cover no-repeat fixed;
    }

    .page {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(0, 0.9fr) minmax(420px, 520px);
      gap: 42px;
      align-items: center;
      max-width: 1160px;
      margin: 0 auto;
      padding: 38px 28px;
    }

    .intro {
      max-width: 560px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      min-height: 58px;
      margin-bottom: 24px;
      padding: 8px 18px 8px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.78);
      border: 1px solid rgba(255,255,255,0.82);
      box-shadow: 0 16px 42px rgba(29, 90, 52, 0.14);
      backdrop-filter: blur(8px);
    }

    .cotton-mark {
      position: relative;
      width: 48px;
      height: 40px;
      flex: 0 0 48px;
    }

    .cotton-mark::before {
      content: "";
      position: absolute;
      left: 14px;
      top: 0;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #fff;
      box-shadow:
        -14px 12px 0 #fffaf1,
        14px 12px 0 #fff,
        0 20px 0 #fffdf7;
      filter: drop-shadow(0 6px 8px rgba(43, 82, 50, 0.16));
    }

    .cotton-mark::after {
      content: "";
      position: absolute;
      left: 12px;
      bottom: 1px;
      width: 30px;
      height: 12px;
      border-radius: 100% 0 100% 0;
      background: linear-gradient(135deg, #4fa866, var(--green-dark));
      transform: rotate(-14deg);
    }

    .brand-title {
      display: block;
      color: var(--green-dark);
      font-size: 20px;
      font-weight: 900;
      line-height: 1.2;
    }

    .brand-sub {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    h1 {
      max-width: 560px;
      margin-bottom: 18px;
      color: #163f28;
      font-size: 44px;
      line-height: 1.18;
      font-weight: 900;
      letter-spacing: 0;
      text-shadow: 0 2px 0 rgba(255, 255, 255, 0.65);
    }

    .lead {
      max-width: 520px;
      color: #405344;
      font-size: 18px;
      line-height: 1.85;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.72);
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 26px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 7px 13px;
      border-radius: 999px;
      color: #255537;
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(255,255,255,0.78);
      box-shadow: 0 8px 22px rgba(35, 122, 72, 0.08);
      font-size: 14px;
      font-weight: 850;
      backdrop-filter: blur(8px);
    }

    .card {
      width: 100%;
      border-radius: 8px;
      padding: 30px;
      background: var(--paper);
      border: 1px solid rgba(255,255,255,0.86);
      box-shadow: 0 26px 70px rgba(27, 79, 48, 0.22);
      backdrop-filter: blur(14px);
    }

    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 20px;
    }

    .title-wrap { min-width: 0; }

    .role-kicker {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      margin-bottom: 8px;
      padding: 0 10px;
      border-radius: 999px;
      color: var(--green-dark);
      background: var(--green-soft);
      font-size: 13px;
      font-weight: 900;
    }

    body.op .role-kicker { color: #0f6289; background: var(--blue-soft); }

    .card-title {
      color: #173d27;
      font-size: 26px;
      line-height: 1.25;
      font-weight: 900;
    }

    .card-subtitle {
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .role-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 5px;
      margin-bottom: 20px;
      border-radius: 8px;
      background: #eef4ee;
      border: 1px solid var(--line);
    }

    .role-btn {
      min-height: 44px;
      border: 0;
      border-radius: 6px;
      color: #5d6d5f;
      background: transparent;
      cursor: pointer;
      font-size: 15px;
      font-weight: 900;
      transition: background .18s, color .18s, box-shadow .18s;
    }

    .role-btn.active {
      color: #fff;
      box-shadow: 0 8px 20px rgba(35, 122, 72, 0.2);
    }

    body.op .role-btn.active.op-btn {
      background: linear-gradient(135deg, #2a8fc4, #176b9c);
      box-shadow: 0 8px 20px rgba(33, 127, 198, 0.22);
    }

    body.mc .role-btn.active.mc-btn {
      background: linear-gradient(135deg, #2f9657, #1b6a3e);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px 12px;
    }

    .field {
      min-width: 0;
    }

    .field.full { grid-column: 1 / -1; }

    label {
      display: block;
      margin-bottom: 7px;
      color: #344d38;
      font-size: 14px;
      font-weight: 850;
    }

    input {
      width: 100%;
      height: 48px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfefb;
      color: var(--ink);
      padding: 0 13px;
      outline: none;
      font-size: 15px;
      transition: border-color .18s, box-shadow .18s, background .18s;
    }

    input::placeholder { color: #9aab9c; }

    input:focus {
      border-color: rgba(35, 122, 72, 0.72);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(35, 122, 72, 0.1);
    }

    body.op input:focus {
      border-color: rgba(33, 127, 198, 0.72);
      box-shadow: 0 0 0 4px rgba(33, 127, 198, 0.1);
    }

    .geo-box {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: 180px 1fr 1fr;
      gap: 10px;
      align-items: end;
      padding: 12px;
      border-radius: 8px;
      background: #f7fbf7;
      border: 1px solid var(--line);
    }

    body.op .geo-box { background: #f4faff; }

    .geo-btn {
      width: 100%;
      height: 48px;
      border: 1px solid rgba(35, 122, 72, 0.32);
      border-radius: 8px;
      color: var(--green-dark);
      background: #fff;
      cursor: pointer;
      font-size: 14px;
      font-weight: 900;
      transition: border-color .18s, background .18s, transform .18s;
    }

    body.op .geo-btn {
      color: #176b9c;
      border-color: rgba(33, 127, 198, 0.32);
    }

    .geo-btn:hover {
      transform: translateY(-1px);
      background: #f4faf5;
      border-color: rgba(35, 122, 72, 0.54);
    }

    .geo-hint {
      grid-column: 1 / -1;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .submit-btn {
      width: 100%;
      height: 52px;
      margin-top: 18px;
      border: 0;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-size: 17px;
      font-weight: 900;
      background: linear-gradient(135deg, #2f9657, #1b6a3e);
      box-shadow: 0 14px 30px rgba(35, 122, 72, 0.28);
      transition: transform .18s, filter .18s, opacity .18s;
    }

    body.op .submit-btn {
      background: linear-gradient(135deg, #2a8fc4, #176b9c);
      box-shadow: 0 14px 30px rgba(33, 127, 198, 0.26);
    }

    .submit-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.04);
    }

    .submit-btn:disabled {
      cursor: not-allowed;
      opacity: .58;
      transform: none;
    }

    .msg {
      min-height: 20px;
      margin-top: 13px;
      text-align: center;
      font-size: 14px;
      font-weight: 750;
    }

    .msg.err { color: var(--danger); }
    .msg.ok { color: var(--green-dark); }

    .foot {
      margin-top: 18px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    .foot a {
      color: var(--blue);
      font-weight: 900;
      text-decoration: none;
    }

    .attach-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 8px;
    }

    .attach-card {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfefb;
    }

    .attach-card label {
      margin-bottom: 8px;
    }

    .attach-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .attach-row input {
      flex: 1;
      min-width: 0;
    }

    .attach-btn {
      flex: 0 0 auto;
      height: 48px;
      padding: 0 14px;
      border: 0;
      border-radius: 8px;
      background: linear-gradient(135deg, #2f9657, #1b6a3e);
      color: #fff;
      font-weight: 800;
      cursor: pointer;
    }

    .attach-preview {
      display: block;
      width: 100%;
      max-height: 120px;
      margin-top: 8px;
      border-radius: 8px;
      object-fit: cover;
      background: #eef4ee;
    }

    .hidden { display: none; }

    @media (max-width: 980px) {
      body {
        background:
          linear-gradient(180deg, rgba(255,255,255,0.92), rgba(255,255,255,0.74)),
          url("/admin/assets/cotton-field-sky.png") center center / cover no-repeat fixed;
      }

      .page {
        grid-template-columns: 1fr;
        gap: 28px;
        padding: 30px 18px 38px;
      }

      .intro {
        max-width: 720px;
      }

      h1 { font-size: 36px; }
      .lead { font-size: 16px; }
      .card {
        max-width: 620px;
        margin: 0 auto;
      }
    }

    @media (max-width: 620px) {
      .page { padding: 22px 12px 28px; }
      .brand {
        align-items: flex-start;
        border-radius: 8px;
      }
      h1 { font-size: 30px; }
      .card { padding: 24px 16px 20px; }
      .card-head {
        display: block;
        margin-bottom: 18px;
      }
      .form-grid { grid-template-columns: 1fr; }
      .attach-grid { grid-template-columns: 1fr; }
      .geo-box { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body class="op">
  <main class="page">
    <section class="intro" aria-label="入驻说明">
      <div class="brand">
        <span class="cotton-mark" aria-hidden="true"></span>
        <span>
          <span class="brand-title">Cotton 棉花平台</span>
          <span class="brand-sub">服务新疆棉农、商户和农机手</span>
        </span>
      </div>

      <h1>申请加入棉花平台</h1>
      <p class="lead">商户可以入驻销售农资，农机手可以发布农机服务。提交资料后，平台管理员会进行审核。</p>

      <div class="badges" aria-label="入驻类型">
        <span class="badge">商户入驻</span>
        <span class="badge">农机手入驻</span>
        <span class="badge">管理员审核后开通</span>
      </div>
    </section>

    <section class="card" aria-label="入驻申请表单">
      <div class="card-head">
        <div class="title-wrap">
          <span class="role-kicker" id="roleKicker">农机手入驻</span>
          <h2 class="card-title" id="logoTitle">农机手入驻申请</h2>
          <p class="card-subtitle" id="logoSub">填写机队和服务位置，审核通过后即可接单。</p>
        </div>
      </div>

      <div class="role-toggle" role="tablist" aria-label="选择入驻身份">
        <button type="button" class="role-btn op-btn active" data-role="operator" onclick="setRole('operator')">我是农机手</button>
        <button type="button" class="role-btn mc-btn" data-role="merchant" onclick="setRole('merchant')">我是商户</button>
      </div>

      <div class="form-grid">
        <div class="field">
          <label for="phone">手机号 *</label>
          <input id="phone" type="tel" maxlength="11" placeholder="作为登录账号">
        </div>
        <div class="field">
          <label for="password">登录密码 *</label>
          <input id="password" type="password" placeholder="至少6位">
        </div>

        <div id="opFields" class="form-grid field full">
          <div class="field full">
            <label for="org_name">合作社 / 机队名称 *</label>
            <input id="org_name" placeholder="如：艾力农机合作社">
          </div>
          <div class="field">
            <label for="contact">联系人 *</label>
            <input id="contact" placeholder="负责人姓名">
          </div>
          <div class="field">
            <label for="id_card">资质 / 身份证号</label>
            <input id="id_card" placeholder="选填">
          </div>
          <div class="field">
            <label for="service_area">服务区域</label>
            <input id="service_area" placeholder="如：喀什·疏附县">
          </div>
          <div class="field">
            <label for="location_name">基地地址</label>
            <input id="location_name" placeholder="如：托克扎克镇">
          </div>
          <div class="geo-box">
            <button type="button" class="geo-btn" onclick="getGeo()">获取当前定位</button>
            <div class="field">
              <label for="latitude">纬度</label>
              <input id="latitude" placeholder="可手动填写">
            </div>
            <div class="field">
              <label for="longitude">经度</label>
              <input id="longitude" placeholder="可手动填写">
            </div>
            <div class="geo-hint" id="geoHint">定位用于农户按距离查找农机服务，也可以手动填写。</div>
          </div>
        </div>

        <div id="mcFields" class="form-grid field full hidden">
          <div class="field full">
            <label for="company_name">店铺 / 企业名称 *</label>
            <input id="company_name" placeholder="如：疏附县农资有限公司">
          </div>
          <div class="field">
            <label for="real_name">联系人 *</label>
            <input id="real_name" placeholder="负责人姓名">
          </div>
          <div class="field">
            <label for="business_license">营业执照号</label>
            <input id="business_license" placeholder="选填">
          </div>
          <div class="field full">
            <label for="product_category">经营品类</label>
            <input id="product_category" placeholder="如：化肥、农药、种子">
          </div>
        </div>

        <div id="mcUploads" class="field full hidden">
          <div class="field full" style="margin-top:8px">
            <label>进件材料 *</label>
            <div class="attach-grid">
              <div class="attach-card">
                <label for="license_copy_url">营业执照图片</label>
                <div class="attach-row">
                  <input id="license_copy_url" readonly placeholder="上传后自动填写">
                  <button type="button" class="attach-btn" onclick="uploadPublicImage('license_copy_url', 'license_copy_preview')">上传</button>
                </div>
                <img id="license_copy_preview" class="attach-preview hidden" alt="营业执照预览">
              </div>
              <div class="attach-card">
                <label for="id_card_copy_url">身份证人像面</label>
                <div class="attach-row">
                  <input id="id_card_copy_url" readonly placeholder="上传后自动填写">
                  <button type="button" class="attach-btn" onclick="uploadPublicImage('id_card_copy_url', 'id_card_copy_preview')">上传</button>
                </div>
                <img id="id_card_copy_preview" class="attach-preview hidden" alt="身份证人像面预览">
              </div>
              <div class="attach-card">
                <label for="id_card_national_url">身份证国徽面</label>
                <div class="attach-row">
                  <input id="id_card_national_url" readonly placeholder="上传后自动填写">
                  <button type="button" class="attach-btn" onclick="uploadPublicImage('id_card_national_url', 'id_card_national_preview')">上传</button>
                </div>
                <img id="id_card_national_preview" class="attach-preview hidden" alt="身份证国徽面预览">
              </div>
              <div class="attach-card">
                <label for="mini_program_pic_url">经营页面截图</label>
                <div class="attach-row">
                  <input id="mini_program_pic_url" readonly placeholder="上传后自动填写">
                  <button type="button" class="attach-btn" onclick="uploadPublicImage('mini_program_pic_url', 'mini_program_pic_preview')">上传</button>
                </div>
                <img id="mini_program_pic_preview" class="attach-preview hidden" alt="经营页面截图预览">
              </div>
            </div>
          </div>
        </div>
      </div>

      <button class="submit-btn" id="submitBtn" onclick="submitApply()">提交入驻申请</button>
      <div class="msg" id="msg"></div>
      <div class="foot">已有账号？<a href="/">返回登录</a></div>
    </section>
  </main>

  <script>
    let role = 'operator'
    const roleText = {
      operator: {
        cls: 'op',
        kicker: '农机手入驻',
        title: '农机手入驻申请',
        sub: '填写机队和服务位置，审核通过后即可接单。'
      },
      merchant: {
        cls: 'mc',
        kicker: '商户入驻',
        title: '商户入驻申请',
        sub: '填写店铺和经营信息，审核通过后系统会自动提交微信进件。'
      }
    }

    function setRole(r) {
      role = r
      const cfg = roleText[r]
      document.body.className = cfg.cls
      document.getElementById('roleKicker').textContent = cfg.kicker
      document.getElementById('logoTitle').textContent = cfg.title
      document.getElementById('logoSub').textContent = cfg.sub
      document.querySelectorAll('.role-btn').forEach(b => b.classList.toggle('active', b.dataset.role === r))
      document.getElementById('opFields').classList.toggle('hidden', r !== 'operator')
      document.getElementById('mcFields').classList.toggle('hidden', r !== 'merchant')
      document.getElementById('mcUploads').classList.toggle('hidden', r !== 'merchant')
      document.getElementById('msg').textContent = ''
    }

    function getGeo() {
      const hint = document.getElementById('geoHint')
      const insecure = location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1'
      if (insecure) {
        hint.textContent = '网页定位需要 HTTPS，请手动填写经纬度，或使用 HTTPS 地址打开。'
        return
      }
      if (!navigator.geolocation) {
        hint.textContent = '当前浏览器不支持定位，请手动填写经纬度。'
        return
      }
      hint.textContent = '定位中...'
      navigator.geolocation.getCurrentPosition(
        p => {
          document.getElementById('latitude').value = p.coords.latitude.toFixed(7)
          document.getElementById('longitude').value = p.coords.longitude.toFixed(7)
          hint.textContent = '定位成功，可手动修改。'
        },
        e => {
          hint.textContent = e.code === 1 ? '已拒绝定位权限，请手动填写经纬度。' : '定位失败，请手动填写经纬度。'
        },
        { enableHighAccuracy: true, timeout: 8000 }
      )
    }

    async function uploadPublicImage(fieldId, previewId) {
      const picker = document.createElement('input')
      picker.type = 'file'
      picker.accept = 'image/*'
      picker.onchange = async () => {
        const file = picker.files && picker.files[0]
        if (!file) return
        const form = new FormData()
        form.append('file', file)
        const target = document.getElementById(fieldId)
        const preview = document.getElementById(previewId)
        if (target) target.placeholder = '上传中...'
        try {
          const res = await fetch('/api/upload/public', {
            method: 'POST',
            body: form
          })
          const data = await res.json()
          if (data.code !== 200 || !data.data || !data.data.url) throw new Error(data.msg || '上传失败')
          if (target) target.value = data.data.url
          if (preview) {
            preview.src = data.data.url
            preview.classList.remove('hidden')
          }
        } catch (err) {
          alert(err.message || '图片上传失败')
        } finally {
          if (target) target.placeholder = '上传后自动填写'
        }
      }
      picker.click()
    }

    async function submitApply() {
      const v = id => (document.getElementById(id).value || '').trim()
      const phone = v('phone')
      const password = document.getElementById('password').value
      const msg = document.getElementById('msg')
      const btn = document.getElementById('submitBtn')

      if (!phone || !password) {
        msg.className = 'msg err'
        msg.textContent = '请填写手机号和密码'
        return
      }

      let api
      let body
      if (role === 'operator') {
        if (!v('org_name') || !v('contact')) {
          msg.className = 'msg err'
          msg.textContent = '请填写合作社名称和联系人'
          return
        }
        api = '/api/operator/apply'
        body = {
          phone,
          password,
          org_name: v('org_name'),
          contact: v('contact'),
          id_card: v('id_card'),
          service_area: v('service_area'),
          location_name: v('location_name'),
          latitude: v('latitude') || null,
          longitude: v('longitude') || null
        }
      } else {
        if (!v('company_name') || !v('real_name')) {
          msg.className = 'msg err'
          msg.textContent = '请填写店铺名称和联系人'
          return
        }
        const required = [
          'company_name', 'real_name', 'contact_mobile', 'merchant_shortname',
          'service_phone', 'mini_program_appid', 'account_bank', 'account_name', 'account_number',
          'license_copy_url', 'id_card_copy_url', 'id_card_national_url', 'mini_program_pic_url'
        ]
        const missing = required.filter(f => !v(f))
        if (missing.length > 0) {
          msg.className = 'msg err'
          msg.textContent = '请把商户资料补全后再提交'
          return
        }
        api = '/api/admin/apply'
        body = {
          phone,
          password,
          real_name: v('real_name'),
          company_name: v('company_name'),
          business_license: v('business_license'),
          product_category: v('product_category'),
          contact_mobile: v('contact_mobile'),
          contact_email: v('contact_email'),
          subject_type: v('subject_type') || 'SUBJECT_TYPE_INDIVIDUAL',
          legal_person: v('legal_person') || v('real_name'),
          id_card_name: v('id_card_name') || v('real_name'),
          id_card_number: v('id_card_number'),
          merchant_shortname: v('merchant_shortname'),
          service_phone: v('service_phone'),
          mini_program_appid: v('mini_program_appid'),
          account_bank: v('account_bank'),
          account_name: v('account_name'),
          account_number: v('account_number'),
          license_copy_url: v('license_copy_url'),
          id_card_copy_url: v('id_card_copy_url'),
          id_card_national_url: v('id_card_national_url'),
          mini_program_pic_url: v('mini_program_pic_url')
        }
      }

      btn.disabled = true
      btn.textContent = '正在提交...'
      msg.textContent = ''

      try {
        const r = await fetch(api, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        })
        const data = await r.json()
        if (data.code === 200) {
          msg.className = 'msg ok'
          msg.textContent = data.msg || '申请已提交，请等待审核'
          btn.textContent = '已提交'
          setTimeout(() => location.replace('/'), 2400)
        } else {
          msg.className = 'msg err'
          msg.textContent = data.msg || '提交失败'
          btn.disabled = false
          btn.textContent = '提交入驻申请'
        }
      } catch (e) {
        msg.className = 'msg err'
        msg.textContent = '网络错误，请重试'
        btn.disabled = false
        btn.textContent = '提交入驻申请'
      }
    }

    const q = new URLSearchParams(location.search).get('role')
    if (q === 'merchant') setRole('merchant')
  </script>
</body>
</html>
