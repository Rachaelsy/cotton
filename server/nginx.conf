# 棉花智能体后端 Nginx 配置
# 使用方法：
#   sudo cp nginx.conf /etc/nginx/conf.d/cotton.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# ─── 阶段一：无域名，仅通过 IP 访问（当前阶段）─────────────────────────────
# 直接开放 3000 端口，或用 Nginx 转发 80 → 3000

server {
    listen 80;
    server_name _;          # 匹配所有 IP / 域名（占位）

    # 静态资源（上传图片）
    location /uploads/ {
        alias /www/cotton/server/public/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 管理后台静态页面
    location /admin/ {
        alias /www/cotton/server/public/admin/;
        try_files $uri $uri/ /admin/index.html;
    }

    location /merchant/ {
        alias /www/cotton/server/public/merchant/;
        try_files $uri $uri/ /merchant/index.html;
    }

    # API 请求反向代理到 Node.js
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        client_max_body_size 10m;
    }
}


