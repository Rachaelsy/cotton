services:

  # ── MySQL 数据库 ───────────────────────────────
  db:
    image: docker.m.daocloud.io/library/mysql:8.0
    container_name: cotton-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: ${DB_NAME:-cotton}
      MYSQL_ROOT_HOST: '%'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./server/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASS}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Node.js 应用 ───────────────────────────────
  app:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: cotton-app
    restart: always
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME:-cotton}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES: ${JWT_EXPIRES:-7d}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
    volumes:
      - uploads:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy

  # ── Nginx 反向代理 ─────────────────────────────
  nginx:
    image: docker.m.daocloud.io/library/nginx:alpine
    container_name: cotton-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./server/nginx-docker.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

volumes:
  mysql_data:
  uploads:
