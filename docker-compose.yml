services:
  db:
    image: docker.m.daocloud.io/library/mysql:8.0
    container_name: cotton-db
    restart: always
    command: --skip-name-resolve
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS:?DB_PASS must be set in the root .env file}
      MYSQL_DATABASE: ${DB_NAME:-cotton}
      MYSQL_ROOT_HOST: "%"
    ports:
      - "127.0.0.1:${DB_HOST_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASS}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - cotton_shared

  app:
    build:
      context: ./cotton-app/server
      dockerfile: Dockerfile
    container_name: cotton-app
    restart: always
    env_file:
      - ./cotton-app/server/.env
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME:-cotton}
      COMMUNITY_BASE_URL: ${COMMUNITY_BASE_URL:-}
    volumes:
      - uploads:/app/public/uploads
      - identity_uploads:/app/private/identity
      - ${WECHAT_PAY_PRIVATE_KEY_HOST_PATH:-./apiclient_key.pem}:/app/apiclient_key.pem:ro
      - ${WECHAT_PAY_PUBLIC_KEY_HOST_PATH:-./pub_key.pem}:/app/pub_key.pem:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/api/ping').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s
    networks:
      - cotton_shared

  community:
    build:
      context: ./cotton-community
      dockerfile: Dockerfile
    container_name: cotton-community
    restart: always
    env_file:
      - ./cotton-app/server/.env
    environment:
      NODE_ENV: production
      PORT: 3100
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME:-cotton}
      PLATFORM_BASE_URL: ${PLATFORM_BASE_URL:-}
      KNOWLEDGE_LOCAL_UPLOAD_MAX_MB: ${KNOWLEDGE_LOCAL_UPLOAD_MAX_MB:-250}
    volumes:
      - community_uploads:/app/public/uploads
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3100/api/community-health').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    networks:
      - cotton_shared

  nginx:
    image: docker.m.daocloud.io/library/nginx:alpine
    container_name: cotton-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/proxy_params:/etc/nginx/proxy_params:ro
    depends_on:
      app:
        condition: service_healthy
      community:
        condition: service_healthy
    networks:
      - cotton_shared

volumes:
  mysql_data:
    name: cotton_mysql_data
  uploads:
    name: cotton_uploads
  identity_uploads:
    name: cotton_identity_uploads
  community_uploads:
    name: cotton-community_community_uploads

networks:
  cotton_shared:
    name: cotton-shared
