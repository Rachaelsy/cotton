services:

  # ── MySQL 数据库 ───────────────────────────────
  db:
    image: docker.m.daocloud.io/library/mysql:8.0
    container_name: cotton-db
    restart: always
    command: --skip-name-resolve
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: ${DB_NAME:-cotton}
      MYSQL_ROOT_HOST: '%'
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASS}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Node.js 应用 ───────────────────────────────
  app:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: cotton-app
    restart: always
    env_file:
      - ./server/.env
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME:-cotton}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES: ${JWT_EXPIRES:-7d}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      WEATHER_PROVIDER: ${WEATHER_PROVIDER:-qweather}
      QWEATHER_API_HOST: ${QWEATHER_API_HOST:-}
      QWEATHER_API_KEY: ${QWEATHER_API_KEY:-}
      QWEATHER_JWT_KID: ${QWEATHER_JWT_KID:-}
      QWEATHER_JWT_SUB: ${QWEATHER_JWT_SUB:-}
      QWEATHER_JWT_PRIVATE_KEY_PATH: ${QWEATHER_JWT_PRIVATE_KEY_PATH:-}
      QWEATHER_JWT_PRIVATE_KEY: ${QWEATHER_JWT_PRIVATE_KEY:-}
      QWEATHER_TIMEOUT_MS: ${QWEATHER_TIMEOUT_MS:-8000}
    volumes:
      - uploads:/app/public/uploads
      - ${WECHAT_PAY_PRIVATE_KEY_HOST_PATH:-./apiclient_key.pem}:/app/apiclient_key.pem:ro
      - ${WECHAT_PAY_PUBLIC_KEY_HOST_PATH:-./pub_key.pem}:/app/pub_key.pem:ro
    depends_on:
      db:
        condition: service_healthy

  # ── Nginx 反向代理 ─────────────────────────────
  nginx:
    image: docker.m.daocloud.io/library/nginx:alpine
    container_name: cotton-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./server/nginx-docker.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

volumes:
  mysql_data:
  uploads:
