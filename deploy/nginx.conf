map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
}

upstream cotton_app {
    server app:3000;
}

upstream cotton_community {
    server community:3100;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 500m;

    location = /knowledge {
        return 301 /knowledge/;
    }

    location ^~ /knowledge/ {
        proxy_pass http://cotton_community;
        include /etc/nginx/proxy_params;
    }

    location ^~ /assets/ {
        proxy_pass http://cotton_community;
        include /etc/nginx/proxy_params;
    }

    location ^~ /uploads/knowledge/ {
        proxy_pass http://cotton_community;
        include /etc/nginx/proxy_params;
    }

    location ^~ /api/knowledge/ {
        proxy_pass http://cotton_community;
        include /etc/nginx/proxy_params;
    }

    location ^~ /api/community-auth/ {
        proxy_pass http://cotton_community;
        include /etc/nginx/proxy_params;
    }

    location ^~ /api/community-ai/ {
        proxy_pass http://cotton_community;
        include /etc/nginx/proxy_params;
    }

    location = /api/community-health {
        proxy_pass http://cotton_community;
        include /etc/nginx/proxy_params;
    }

    location = /platform {
        proxy_pass http://cotton_community;
        include /etc/nginx/proxy_params;
    }

    location = /platform/admin {
        proxy_pass http://cotton_community;
        include /etc/nginx/proxy_params;
    }

    location / {
        proxy_pass http://cotton_app;
        include /etc/nginx/proxy_params;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
    }
}
